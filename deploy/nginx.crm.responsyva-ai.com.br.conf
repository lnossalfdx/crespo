server {
    listen 80;
    listen [::]:80;
    server_name crm.responsyva-ai.com.br;

    root /var/www/responsyva-crm/dist;
    index index.html;

    access_log /var/log/nginx/responsyva-crm.access.log;
    error_log /var/log/nginx/responsyva-crm.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
